
name: Generate Snake

on:
  # run automatically once a day
  schedule:
    - cron: "0 0 * * *"
  # let you run it manually from the Actions tab
  workflow_dispatch:
  # also run whenever you push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate the snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-amethyst.svg?color_snake=#b89cf0&color_dots=#161b22,#3a2a5c,#6b4fa0,#9b78d6,#b89cf0

      - name: Push the SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
