
name: Generate Snake

on:
  # run automatically once a day
  schedule:
    - cron: "0 0 * * *"
  # let you run it manually from the Actions tab
  workflow_dispatch:
  # also run whenever you push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate the snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
                       dist/github-snake-frost.svg?color_snake=#22d3ee&color_dots=#0a1820,#0e4d5c,#1d8aa0,#38bdf8,#a5f3fc
      - name: Push the SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
